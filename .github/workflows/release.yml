name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: nyxal-linux-x64.gz
          - os: windows-latest
            asset: nyxal-windows-x64.zip
          - os: macos-14
            asset: nyxal-darwin-arm64.gz
    steps:
      - uses: actions/checkout@v4

      - uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # native build for the runner's platform (includes bytecode + correct
      # sharp addon). output -> a single self-contained binary in build/.
      - run: bun scripts/compile.ts
        shell: bash

      - name: Archive (unix)
        if: matrix.os != 'windows-latest'
        run: gzip -c build/nyxal > ${{ matrix.asset }}

      - name: Archive (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path build\nyxal.exe -DestinationPath ${{ matrix.asset }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=ci,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # load (without push) on manual dispatch just validates the build locally
          load: ${{ !startsWith(github.ref, 'refs/tags/') }}

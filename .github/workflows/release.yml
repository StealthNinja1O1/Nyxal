name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun scripts/compile.ts bun-linux-x64 bun-linux-arm64 bun-windows-x64 bun-darwin-arm64 bun-darwin-x64
      - name: Smoke test (linux-x64)
        run: |
          ./build/nyxal-linux-x64 &
          PID=$!
          sleep 3
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:3000/ | grep -q '<!doctype html>'
          kill $PID

      - name: Archive (unix)
        run: |
          gzip -kf build/nyxal-linux-x64
          gzip -kf build/nyxal-linux-arm64
          gzip -kf build/nyxal-darwin-arm64
          gzip -kf build/nyxal-darwin-x64

      - name: Archive (windows)
        run: zip -j build/nyxal-windows-x64.zip build/nyxal-windows-x64.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/nyxal-linux-x64.gz
            build/nyxal-linux-arm64.gz
            build/nyxal-darwin-arm64.gz
            build/nyxal-darwin-x64.gz
            build/nyxal-windows-x64.zip
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: repo
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=ci,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # load (without push) on manual dispatch just validates the build locally
          load: ${{ !startsWith(github.ref, 'refs/tags/') }}

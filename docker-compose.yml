services:
  nyxal:
    build: .
    container_name: nyxal
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data # sqlite db, kinda required
    environment:
      NYXAL_PORT: "3000"
      # NYXAL_DB_PATH defaults to /app/data/nyxal.db, overridable
      NYXAL_LOG_RETENTION_DAYS: "30"
      NYXAL_LOG_HISTORY: "500"
    healthcheck:
      test: ["CMD-SHELL", "command -v wget >/dev/null 2>&1 && wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
